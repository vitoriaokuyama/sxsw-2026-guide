<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SXSW 2026 Unofficial Event Guide</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Y9RPBZ9TY0"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #000000;
  --surface: #0a0a0a;
  --surface2: #141414;
  --border: #202020;
  --text: #e2e2e2;
  --text-muted: #777777;
  --accent: #D6FD3A;
  --accent-dark: #b8e02e;
  --accent-glow: rgba(214, 253, 58, 0.1);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ─── Hero ─────────────────────────────────────────────── */
.hero {
  background: #000;
  padding: 60px 24px 24px;
  text-align: center;
  position: relative;
  border-bottom: 1px solid var(--border);
}

.hero h1 {
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 900;
  letter-spacing: -0.04em;
  color: #fff;
}

.hero h1 span {
  color: var(--accent);
}

.hero .subtitle {
  font-size: 1.1rem;
  color: var(--text-muted);
  margin-top: 8px;
  font-weight: 500;
}

.built-by {
  font-size: 1.1rem;
  color: var(--text-muted);
  margin-top: 4px;
  font-weight: 500;
}

.linkedin-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 8px;
  padding: 8px 18px;
  color: var(--text-muted);
  font-size: 0.9rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.15s;
  border: 1.5px solid var(--border);
  border-radius: 9999px;
}

.linkedin-link:hover { color: #fff; border-color: #fff; }

.hero .stats {
  display: flex;
  justify-content: center;
  gap: 48px;
  margin-top: 32px;
}

.hero .stat {
  text-align: center;
}

.hero .stat-num {
  font-size: 2.2rem;
  font-weight: 800;
  color: var(--accent);
}

.hero .stat-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ─── Search ───────────────────────────────────────────── */
.search-wrap {
  max-width: 600px;
  margin: 24px auto 0;
  padding: 0 24px;
  position: relative;
  z-index: 10;
}

.search-input {
  width: 100%;
  padding: 16px 20px 16px 48px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 9999px;
  color: var(--text);
  font-size: 1rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.search-icon {
  position: absolute;
  left: 40px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 1.1rem;
  pointer-events: none;
}

/* ─── Filters ──────────────────────────────────────────── */
.filters {
  max-width: 1200px;
  margin: 32px auto 0;
  padding: 0 24px;
}

.filter-section {
  margin-bottom: 16px;
}

.filter-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  margin-bottom: 8px;
  font-weight: 600;
}

.day-filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.day-btn {
  padding: 8px 16px;
  background: transparent;
  border: 2px solid var(--border);
  border-radius: 9999px;
  color: var(--text-muted);
  font-size: 0.82rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.day-btn:hover {
  border-color: var(--accent);
  color: var(--text);
}

.day-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
  font-weight: 700;
}

.day-btn .count {
  font-size: 0.7rem;
  opacity: 0.6;
  margin-left: 4px;
}

.cat-filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

@media (max-width: 640px) {
  .cat-filters { gap: 4px; }
  .cat-btn { padding: 4px 8px; font-size: 0.65rem; border-width: 1.5px; }
}

.cat-btn {
  padding: 6px 14px;
  border: 2px solid;
  border-radius: 9999px;
  font-size: 0.78rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  opacity: 0.4;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.cat-btn:hover { opacity: 0.75; }

.cat-btn.active {
  opacity: 1;
}

/* ─── Results info ─────────────────────────────────────── */
.results-info {
  max-width: 1200px;
  margin: 24px auto 8px;
  padding: 0 24px;
  font-size: 0.85rem;
  color: var(--text-muted);
  font-weight: 500;
}

.results-info span {
  color: var(--accent);
  font-weight: 700;
}

/* ─── Event Grid ───────────────────────────────────────── */
.grid {
  max-width: 1200px;
  margin: 16px auto;
  padding: 0 24px 60px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

.card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  transition: transform 0.15s, border-color 0.15s;
  display: flex;
  flex-direction: column;
}

.card:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}

.card-title {
  font-size: 1rem;
  font-weight: 700;
  line-height: 1.3;
  color: #fff;
  flex: 1;
}

.card-badge {
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  white-space: nowrap;
  flex-shrink: 0;
}

.card-meta {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 12px;
}

.card-meta-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.82rem;
  color: var(--text-muted);
}

.card-meta-icon {
  width: 16px;
  text-align: center;
  flex-shrink: 0;
}

.card-desc {
  font-size: 0.82rem;
  color: #7a7a90;
  line-height: 1.5;
  flex: 1;
  margin-bottom: 14px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
}

.card-free {
  font-size: 0.75rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 6px;
}

.cost-free {
  background: rgba(214, 253, 58, 0.12);
  color: var(--accent);
  border: 1px solid rgba(214, 253, 58, 0.25);
}

.cost-paid {
  background: rgba(255, 255, 255, 0.12);
  color: #ccc;
  border: 1px solid rgba(255, 255, 255, 0.3);
}

.cost-filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.cost-btn {
  padding: 6px 14px;
  background: transparent;
  border: 2px solid var(--border);
  border-radius: 9999px;
  font-size: 0.78rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text-muted);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.cost-btn:hover { color: var(--text); border-color: var(--accent); }

.cost-btn.active {
  color: #000;
  border-color: var(--accent);
  background: var(--accent);
  font-weight: 700;
}

/* ─── Top row (category + heart) ──────────────────────── */
.card-top-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.card-save {
  background: transparent;
  border: 2px solid var(--border);
  border-radius: 9999px;
  font-size: 0.75rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.15s;
  padding: 4px 14px;
  white-space: nowrap;
}

.card-save:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.card-save.saved {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
  font-weight: 700;
}

.card-share {
  background: transparent;
  border: 2px solid var(--border);
  border-radius: 9999px;
  font-size: 0.75rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.15s;
  padding: 4px 14px;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.card-share:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ─── Share bar ───────────────────────────────────────── */
.share-bar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.saved-toggle {
  padding: 8px 20px;
  background: transparent;
  border: 2px solid var(--border);
  border-radius: 9999px;
  color: var(--text-muted);
  font-size: 0.82rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
}

.saved-toggle:hover { border-color: var(--accent); color: var(--text); }

.saved-toggle.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
  font-weight: 700;
}

.share-btn {
  padding: 8px 20px;
  background: #fff;
  border: none;
  border-radius: 9999px;
  color: #000;
  font-size: 0.82rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}

.share-btn:hover {
  background: var(--accent);
  transform: scale(1.03);
}

.share-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--accent);
  color: #000;
  padding: 14px 28px;
  border-radius: 9999px;
  font-weight: 700;
  font-size: 0.9rem;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  transition: transform 0.3s ease;
  z-index: 100;
}

.share-toast.show {
  transform: translateX(-50%) translateY(0);
}

.shared-banner {
  position: sticky;
  top: 0;
  z-index: 50;
  max-width: 100%;
  margin: 0;
  padding: 14px 24px;
  background: #111;
  border-bottom: 2px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.shared-banner-text {
  color: var(--accent);
  font-weight: 700;
  font-size: 1rem;
}

.shared-banner-actions {
  display: flex;
  gap: 8px;
}

.shared-banner-btn {
  padding: 6px 16px;
  border-radius: 9999px;
  font-size: 0.78rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  touch-action: manipulation;
}

.btn-save-all {
  background: var(--accent);
  border: none;
  color: #000;
}

.btn-save-all:hover { opacity: 0.85; }

.btn-start-fresh {
  background: transparent;
  border: 2px solid var(--border);
  color: var(--text-muted);
}

.btn-start-fresh:hover { border-color: var(--accent); color: var(--text); }

.card-rsvp {
  padding: 8px 20px;
  background: var(--accent);
  color: #000;
  text-decoration: none;
  border-radius: 9999px;
  font-size: 0.8rem;
  font-weight: 700;
  transition: background 0.15s, transform 0.1s;
}

.card-rsvp:hover {
  background: var(--accent-dark);
  transform: scale(1.03);
}

/* ─── Empty state ──────────────────────────────────────── */
.empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-icon { font-size: 3rem; margin-bottom: 12px; }
.empty-text { font-size: 1.1rem; font-weight: 600; }

/* ─── Responsive ───────────────────────────────────────── */
@media (max-width: 640px) {
  .hero { padding: 40px 16px 32px; }
  .hero .stats { gap: 20px; }
  .grid { grid-template-columns: 1fr; padding: 0 16px 40px; }
  .search-wrap { padding: 0 16px; }
  .filters { padding: 0 16px; }
  .day-btn { padding: 6px 10px; font-size: 0.75rem; }
}

/* ─── Scrollbar ────────────────────────────────────────── */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #3a3a45; }
</style>
</head>
<body>

<div class="hero">
  <h1>SXSW <span>2026</span></h1>
  <p class="subtitle">Unofficial Event Guide &middot; Austin, TX</p>
  <p class="built-by">by Vitoria Okuyama</p>
  <a class="linkedin-link" href="https://www.linkedin.com/in/vitoriaokuyama/" target="_blank" rel="noopener">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
    LinkedIn
  </a>
</div>

<div class="search-wrap">
  <span class="search-icon">&#128269;</span>
  <input class="search-input" type="text" placeholder="Search events, venues, topics..." id="search">
</div>

<div class="filters">
  <div class="filter-section">
    <div class="filter-label">Filter by Day</div>
    <div class="day-filters" id="dayFilters"></div>
  </div>
  <div class="filter-section">
    <div class="filter-label">Filter by Category</div>
    <div class="cat-filters" id="catFilters"></div>
  </div>
  <div class="filter-section">
    <div class="filter-label">Filter by Cost</div>
    <div class="cost-filters" id="costFilters"></div>
  </div>
</div>

<div id="sharedBanner" class="shared-banner" style="display:none">
  <span class="shared-banner-text" id="sharedBannerText"></span>
  <div class="shared-banner-actions">
    <button class="shared-banner-btn btn-save-all" onclick="saveSharedToMine()">Save All to My List</button>
    <button class="shared-banner-btn btn-start-fresh" onclick="exitSharedView()">Exit &amp; Browse All Events</button>
  </div>
</div>

<div class="share-bar">
  <button class="saved-toggle" id="savedToggle" onclick="toggleSavedFilter()">&#10084; My Saved <span id="savedCount">(0)</span></button>
  <button class="share-btn" id="shareBtn" onclick="shareMyPicks()">Share My List</button>
</div>

<div class="results-info" id="resultsInfo"></div>
<div class="share-toast" id="toast"></div>
<div class="grid" id="grid"></div>

<script>
const CAT_STYLES = {
  'Startups & VC':              { bg: '#0d1f14', fg: '#6EE7B7', border: '#1a3d28' },
  'AI & Emerging Tech':         { bg: '#0c1929', fg: '#7dd3fc', border: '#163352' },
  'Creator Economy':            { bg: '#1a0d2e', fg: '#c4b5fd', border: '#2d1a4e' },
  'Music & Nightlife':          { bg: '#1f0d0d', fg: '#fca5a5', border: '#3d1a1a' },
  'Film, Media & Journalism':   { bg: '#1f1208', fg: '#fdba74', border: '#3d2410' },
  'Networking & Happy Hours':   { bg: '#0d1520', fg: '#93c5fd', border: '#1a2a40' },
  'Exercise & Fitness':         { bg: '#041f16', fg: '#a7f3d0', border: '#083d2c' },
  'Wellness & Healthtech':      { bg: '#0a1f10', fg: '#86efac', border: '#143d20' },
  'Food, Drink & Culinary':     { bg: '#1f0d16', fg: '#f9a8d4', border: '#3d1a2c' },
  'International & Country Houses': { bg: '#141414', fg: '#d1d5db', border: '#282828' },
  'Art, Culture & Community':   { bg: '#1f1508', fg: '#fde68a', border: '#3d2a10' },
  'Women, DEI & Social Impact': { bg: '#1a0d22', fg: '#e9a8fc', border: '#331a44' },
};

const DAYS = [
  { key: 'Tue Mar 10', label: 'Tue 10', full: 'Tuesday March 10' },
  { key: 'Wed Mar 11', label: 'Wed 11', full: 'Wednesday March 11' },
  { key: 'Thu Mar 12', label: 'Thu 12', full: 'Thursday March 12' },
  { key: 'Fri Mar 13', label: 'Fri 13', full: 'Friday March 13' },
  { key: 'Sat Mar 14', label: 'Sat 14', full: 'Saturday March 14' },
  { key: 'Sun Mar 15', label: 'Sun 15', full: 'Sunday March 15' },
  { key: 'Mon Mar 16', label: 'Mon 16', full: 'Monday March 16' },
  { key: 'Tue Mar 17', label: 'Tue 17', full: 'Tuesday March 17' },
  { key: 'Wed Mar 18', label: 'Wed 18', full: 'Wednesday March 18' },
];

let EVENTS = [];
let activeDay = null;
let activeCats = new Set();
let activeCost = null;
let searchQuery = '';
let showSavedOnly = false;
let savedEvents = new Set(JSON.parse(localStorage.getItem('sxsw_saved') || '[]'));

// ─── Load data ──────────────────────────────────────────
function init(data) {
  EVENTS = data;
  const tc = document.getElementById('totalCount'); if (tc) tc.textContent = EVENTS.length;
  buildDayFilters();
  buildCatFilters();
  buildCostFilters();
  loadSharedPicks();
  updateSavedCount();
  render();
}

function buildDayFilters() {
  const container = document.getElementById('dayFilters');
  // All button
  const allBtn = document.createElement('button');
  allBtn.className = 'day-btn active';
  allBtn.innerHTML = `All`;
  allBtn.onclick = () => { activeDay = null; updateDayButtons(); render(); };
  container.appendChild(allBtn);

  DAYS.forEach(day => {
    const count = EVENTS.filter(e => e.d === day.key).length;
    if (count === 0) return;
    const btn = document.createElement('button');
    btn.className = 'day-btn';
    btn.innerHTML = `${day.label}<span class="count">${count}</span>`;
    btn.dataset.day = day.key;
    btn.onclick = () => {
      activeDay = activeDay === day.key ? null : day.key;
      updateDayButtons();
      render();
    };
    container.appendChild(btn);
  });
}

function updateDayButtons() {
  document.querySelectorAll('.day-btn').forEach(btn => {
    if (!btn.dataset.day) {
      btn.classList.toggle('active', activeDay === null);
    } else {
      btn.classList.toggle('active', btn.dataset.day === activeDay);
    }
  });
}

const CAT_SHORT = {
  'Startups & VC': 'Startups',
  'AI & Emerging Tech': 'AI & Tech',
  'Creator Economy': 'Creator Economy',
  'Music & Nightlife': 'Music',
  'Film, Media & Journalism': 'Film & Media',
  'Networking & Happy Hours': 'Networking',
  'Exercise & Fitness': 'Fitness',
  'Wellness & Healthtech': 'Wellness',
  'Food, Drink & Culinary': 'Food & Drink',
  'International & Country Houses': 'International',
  'Art, Culture & Community': 'Art & Culture',
  'Women, DEI & Social Impact': 'Women & DEI',
};
const isMobile = () => window.innerWidth <= 640;

function buildCatFilters() {
  const container = document.getElementById('catFilters');
  const cats = Object.keys(CAT_STYLES);

  // "All" button
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn active';
  allBtn.textContent = 'All';
  allBtn.style.background = '#333';
  allBtn.style.borderColor = '#666';
  allBtn.style.color = '#fff';
  allBtn.onclick = () => {
    activeCats.clear();
    updateCatButtons();
    render();
  };
  container.appendChild(allBtn);

  cats.forEach(cat => {
    const count = EVENTS.filter(e => e.c === cat).length;
    const style = CAT_STYLES[cat];
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    const mobile = isMobile();
    const label = mobile ? CAT_SHORT[cat] || cat : cat;
    btn.textContent = mobile ? label : `${label} (${count})`;
    btn.style.background = style.bg;
    btn.style.borderColor = style.fg + '40';
    btn.style.color = style.fg;
    btn.dataset.cat = cat;
    btn.onclick = () => {
      if (activeCats.has(cat)) {
        activeCats.delete(cat);
      } else {
        activeCats.add(cat);
      }
      updateCatButtons();
      render();
    };
    container.appendChild(btn);
  });
}

function updateCatButtons() {
  const noFilter = activeCats.size === 0;
  document.querySelectorAll('.cat-btn').forEach(btn => {
    if (!btn.dataset.cat) {
      // "All" button
      btn.classList.toggle('active', noFilter);
    } else {
      btn.classList.toggle('active', activeCats.has(btn.dataset.cat));
    }
  });
}

const COST_GROUPS = [
  { key: 'free', label: 'Free', match: v => v === 'Free' },
  { key: 'paid', label: 'Paid', match: v => v === 'Paid' },
];

function buildCostFilters() {
  const container = document.getElementById('costFilters');

  const allBtn = document.createElement('button');
  allBtn.className = 'cost-btn active';
  allBtn.textContent = 'All';
  allBtn.onclick = () => { activeCost = null; updateCostButtons(); render(); };
  container.appendChild(allBtn);

  COST_GROUPS.forEach(g => {
    const count = EVENTS.filter(e => g.match(e.f)).length;
    const btn = document.createElement('button');
    btn.className = 'cost-btn';
    btn.textContent = `${g.label} (${count})`;
    btn.dataset.cost = g.key;
    btn.onclick = () => {
      activeCost = activeCost === g.key ? null : g.key;
      updateCostButtons();
      render();
    };
    container.appendChild(btn);
  });
}

function updateCostButtons() {
  document.querySelectorAll('.cost-btn').forEach(btn => {
    if (!btn.dataset.cost) {
      btn.classList.toggle('active', activeCost === null);
    } else {
      btn.classList.toggle('active', btn.dataset.cost === activeCost);
    }
  });
}

function getCostClass(val) {
  if (val === 'Free') return 'cost-free';
  if (val === 'Invite Only') return 'cost-invite';
  if (val === 'Paid') return 'cost-paid';
  return 'cost-free';
}

function getEventId(e) {
  let hash = 0;
  const s = e.n + '|' + e.d;
  for (let i = 0; i < s.length; i++) {
    hash = ((hash << 5) - hash) + s.charCodeAt(i);
    hash |= 0;
  }
  return 'e' + Math.abs(hash).toString(36);
}

function getFiltered() {
  return EVENTS.filter(e => {
    if (showSavedOnly && !savedEvents.has(getEventId(e))) return false;
    if (activeDay && e.d !== activeDay) return false;
    if (activeCats.size > 0 && activeCats.size < 12 && !activeCats.has(e.c)) return false;
    if (activeCost) {
      const group = COST_GROUPS.find(g => g.key === activeCost);
      if (group && !group.match(e.f)) return false;
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase().trim();
      const haystack = `${e.n} ${e.l} ${e.ds} ${e.c}`.toLowerCase();
      // Word boundary match — "run" matches "run" and "running" but not "brunch"
      const regex = new RegExp('\\b' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i');
      if (!regex.test(haystack)) return false;
    }
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  const grid = document.getElementById('grid');
  const info = document.getElementById('resultsInfo');

  if (viewingShared) {
    info.innerHTML = `Friend's list: <span>${filtered.length}</span> event${filtered.length !== 1 ? 's' : ''} — tap "+ My List" to save any to yours`;
  } else if (showSavedOnly) {
    info.innerHTML = `Your saved events: <span>${filtered.length}</span>`;
  } else {
    info.innerHTML = `Showing <span>${filtered.length}</span> of ${EVENTS.length} events`;
  }

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">&#128533;</div><div class="empty-text">No events match your filters</div></div>`;
    return;
  }

  grid.innerHTML = filtered.map(e => {
    const style = CAT_STYLES[e.c] || CAT_STYLES['Networking & Happy Hours'];
    const costClass = getCostClass(e.f);
    const freeLabel = e.f || '';
    const rsvpLink = e.u ? `<a class="card-rsvp" href="${e.u}" target="_blank" rel="noopener" onclick="exitSavedView()">RSVP &rarr;</a>` : '';
    const eid = getEventId(e);
    const isSaved = savedEvents.has(eid);
    const myBackup = window._mySavedBackup || new Set();
    const alreadyInMyList = viewingShared && myBackup.has(eid);

    let actionBtns;
    if (viewingShared) {
      actionBtns = alreadyInMyList
        ? `<button class="card-save saved" disabled>In My List &#10003;</button>`
        : `<button class="card-save" onclick="addOneToMyList('${eid}', this)">+ My List</button>`;
    } else {
      actionBtns = `<button class="card-share" onclick="shareEvent('${eid}')">Share</button><button class="card-save ${isSaved ? 'saved' : ''}" onclick="toggleSave('${eid}', this)">${isSaved ? 'Saved &#10084;' : 'Save &#9825;'}</button>`;
    }

    return `<div class="card">
      <div class="card-top-row">
        <span class="card-badge" style="background:${style.bg};color:${style.fg};border:1px solid ${style.border || style.bg}">${esc(e.c)}</span>
        <span style="display:flex;gap:6px">${actionBtns}</span>
      </div>
      <div class="card-header">
        <div class="card-title">${esc(e.n)}</div>
      </div>
      <div class="card-meta">
        <div class="card-meta-item"><span class="card-meta-icon">&#128197;</span>${esc(e.d)}${e.t ? ' &middot; ' + esc(e.t) : ''}</div>
        ${e.l ? `<div class="card-meta-item"><span class="card-meta-icon">&#128205;</span>${esc(e.l)}</div>` : ''}
      </div>
      ${e.ds ? `<div class="card-desc">${esc(e.ds)}</div>` : ''}
      <div class="card-footer">
        ${freeLabel ? `<span class="card-free ${costClass}">${esc(freeLabel)}</span>` : '<span></span>'}
        ${rsvpLink}
      </div>
    </div>`;
  }).join('');
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Save & Share ──────────────────────────────────────
function toggleSave(eid, btn) {
  if (savedEvents.has(eid)) {
    savedEvents.delete(eid);
    btn.classList.remove('saved');
    btn.innerHTML = 'Save &#9825;';
  } else {
    savedEvents.add(eid);
    btn.classList.add('saved');
    btn.innerHTML = 'Saved &#10084;';
  }
  localStorage.setItem('sxsw_saved', JSON.stringify([...savedEvents]));
  updateSavedCount();
}

function updateSavedCount() {
  document.getElementById('savedCount').textContent = `(${savedEvents.size})`;
}

function toggleSavedFilter() {
  showSavedOnly = !showSavedOnly;
  document.getElementById('savedToggle').classList.toggle('active', showSavedOnly);
  render();
}

function exitSavedView() {
  if (showSavedOnly) {
    showSavedOnly = false;
    document.getElementById('savedToggle').classList.remove('active');
    render();
  }
}

function addOneToMyList(eid, btn) {
  if (!window._mySavedBackup) window._mySavedBackup = new Set();
  window._mySavedBackup.add(eid);
  localStorage.setItem('sxsw_saved', JSON.stringify([...window._mySavedBackup]));
  btn.classList.add('saved');
  btn.innerHTML = 'In My List &#10003;';
  btn.disabled = true;
  showToast('Event added to your list!');
}

function shareEvent(eid) {
  const e = EVENTS.find(ev => getEventId(ev) === eid);
  if (!e) return;
  const text = `${e.n}\n${e.d}${e.t ? ' · ' + e.t : ''}${e.l ? '\n' + e.l : ''}${e.u ? '\n' + e.u : ''}`;
  if (navigator.share) {
    navigator.share({ title: e.n, text: text, url: e.u || '' }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      showToast('Event details copied!');
    }).catch(() => {
      showToast('Could not copy');
    });
  }
}

function shareMyPicks() {
  if (savedEvents.size === 0) {
    showToast('Save some events first!');
    return;
  }
  const ids = [...savedEvents].join(',');
  const url = window.location.origin + window.location.pathname + '?picks=' + encodeURIComponent(ids);
  if (navigator.share) {
    navigator.share({ title: 'My SXSW 2026 Picks', text: `Check out my ${savedEvents.size} saved SXSW events!`, url: url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(url).then(() => {
      showToast('Link copied! Share it with your friends');
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = url;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Link copied! Share it with your friends');
    });
  }
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ─── Load shared picks from URL ────────────────────────
let viewingShared = false;
let sharedPicks = new Set();

function loadSharedPicks() {
  const params = new URLSearchParams(window.location.search);
  const picks = params.get('picks');
  if (picks) {
    sharedPicks = new Set(picks.split(','));
    viewingShared = true;
    showSavedOnly = true;

    // Temporarily show shared picks without overwriting user's saved events
    const mySaved = savedEvents;
    savedEvents = new Set(sharedPicks);

    const count = sharedPicks.size;
    document.getElementById('sharedBanner').style.display = 'flex';
    document.getElementById('sharedBannerText').innerHTML = `&#128228; A friend shared ${count} event${count !== 1 ? 's' : ''} with you — this is NOT your list`;
    document.getElementById('savedToggle').style.display = 'none';
    document.getElementById('shareBtn').style.display = 'none';
    updateSavedCount();

    // Store user's own saves separately
    window._mySavedBackup = mySaved;
  }
}

function restoreShareBar() {
  document.getElementById('sharedBanner').style.display = 'none';
  document.getElementById('savedToggle').style.display = '';
  document.getElementById('shareBtn').style.display = '';
}

function saveSharedToMine() {
  const mySaved = window._mySavedBackup || new Set();
  sharedPicks.forEach(id => mySaved.add(id));
  savedEvents = mySaved;
  localStorage.setItem('sxsw_saved', JSON.stringify([...savedEvents]));
  viewingShared = false;
  showSavedOnly = true;
  restoreShareBar();
  document.getElementById('savedToggle').classList.add('active');
  updateSavedCount();
  render();
  showToast('Events added to your list!');
  history.replaceState(null, '', window.location.pathname);
}

function exitSharedView() {
  savedEvents = window._mySavedBackup || new Set(JSON.parse(localStorage.getItem('sxsw_saved') || '[]'));
  viewingShared = false;
  showSavedOnly = false;
  restoreShareBar();
  document.getElementById('savedToggle').classList.remove('active');
  updateSavedCount();
  render();
  history.replaceState(null, '', window.location.pathname);
}

// Search
document.getElementById('search').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  render();
});

</script>
